<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Omni Shift AI</title>
    <meta name="description" content="Discover the best AI tools in one place — browse, search, and compare thousands of AI apps by category and pricing." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Omni Shift AI" />
    <meta property="og:description" content="Discover the best AI tools in one place — browse, search, and compare thousands of AI apps by category and pricing." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Omni Shift AI" />
    <meta name="twitter:description" content="Discover the best AI tools in one place — browse, search, and compare thousands of AI apps by category and pricing." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Final safe API intercept with response patching -->
    <script>
      (function() {
        const API_BASE = 'https://omni-shift-ai-api-production.up.railway.app';
        const originalFetch = window.fetch;
        window.fetch = function(input, init) {
          let url = input;
          if (typeof input === 'string' && input.startsWith('/api/')) {
            url = API_BASE + input;
          } else if (input instanceof Request && input.url.startsWith('/api/')) {
            url = new URL(input.url, API_BASE).toString();
          }
          return originalFetch(url, init).then(response => {
            const clonedResponse = response.clone();
            return clonedResponse.json().then(data => {
              // Patch common fields to prevent toLocaleString errors
              if (data && typeof data === 'object') {
                if (data.totalTools === undefined) data.totalTools = 0;
                if (data.featuredTools === undefined) data.featuredTools = 0;
                if (data.totalCategories === undefined) data.totalCategories = 0;
                if (data.recentTools === undefined) data.recentTools = [];
                if (data.tools === undefined) data.tools = [];
                if (data.pagination === undefined) data.pagination = { page: 1, limit: 10, total: 0, totalPages: 0 };
              }
              return new Response(JSON.stringify(data), {
                status: response.status,
                headers: { 'Content-Type': 'application/json' }
              });
            }).catch(() => {
              return response;
            });
          }).catch(err => {
            console.error('API request failed:', err);
            return new Response(JSON.stringify([]), { status: 200, headers: { 'Content-Type': 'application/json' } });
          });
        };
      })();
    </script>
  </body>
</html>
