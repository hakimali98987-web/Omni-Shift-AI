kind = "web"
previewPath = "/"
title = "Omni Shift AI"
version = "1.0.0"
id = "artifacts/omni-shift-ai"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21408

[services.development]
run = "pnpm --filter @workspace/omni-shift-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/omni-shift-ai", "run", "build" ]
serve = "static"
publicDir = "artifacts/omni-shift-ai/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21408"
BASE_PATH = "/"
